name: Actualizar Datos de Rayos GOES

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requisitos.txt

    - name: Ejecutar script del Satelite
      run: python script_satelite.py

    - name: Hacer Commit y Push del JSON actualizado
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add rayos.json
        git commit -m "Actualizacion automatica de rayos" || exit 0
        git push
